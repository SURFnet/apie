name: Run checks for PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  nvd:
    uses: ./.github/workflows/nvd.yml

  check:
    uses: ./.github/workflows/check.yml

  outdated:
    uses: ./.github/workflows/outdated.yml
